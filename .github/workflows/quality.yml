name: Flutter quality

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.0'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  release-signing-fail-closed:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.0'
          channel: stable
          cache: true

      - name: Prepare Gradle metadata
        run: flutter pub get

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14'

      - name: Verify unsigned release is rejected
        shell: bash
        run: |
          set +e
          gradle -p android :app:assembleRelease --dry-run > release-signing.log 2>&1
          status=$?
          set -e
          test "$status" -ne 0
          grep -Fq "Release build requires android/key.properties and a production keystore" release-signing.log
